name: project_pet
description: Project PET - Local NetBattler. A MegaMan BN inspired handheld experience.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Local storage (Offline-First)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Step counter / pedometer
  pedometer: ^4.0.2

  # Bluetooth Low Energy
  flutter_blue_plus: ^1.31.6

  # Accelerometer (Slash-Geste)
  sensors_plus: ^4.0.2

  # Push notifications (Viren-Alarm)
  flutter_local_notifications: ^17.0.0

  # Background service für Schrittzähler
  flutter_background_service: ^5.0.5

  # Pixel-Art Fonts
  google_fonts: ^6.2.1

  # UUID für Geräte-IDs
  uuid: ^4.3.3

  # State management
  provider: ^6.1.2
  intl: ^0.20.2
  path_provider: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.11.0
  flutter_lints: ^3.0.0

flutter_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  remove_alpha_ios: true
  adaptive_icon_background: '#000000'
  adaptive_icon_foreground: assets/app_icon.png

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/images/chips/
