org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Disable Kotlin incremental compilation to avoid cross-drive incremental cache errors
# See: issues when plugin sources live on a different drive than the project
kotlin.incremental=false
